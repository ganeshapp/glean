name: glean
description: "Glean - HN Client + Weekly Curation Publisher"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP & networking
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8

  # HTML parsing
  html: ^0.15.5

  # Local database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Shared preferences
  shared_preferences: ^2.3.4

  # URL launching
  url_launcher: ^6.3.1

  # Share receiving
  receive_sharing_intent:
    git:
      url: https://github.com/KasemJaffer/receive_sharing_intent
      ref: 2cea396843cd3ab1b5ec4334be4233864637874e

  # Date formatting
  intl: ^0.19.0

  # JSON
  json_annotation: ^4.9.0

  # Path
  path_provider: ^2.1.5
  path: ^1.9.1

  # Functional helpers
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.2
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true
